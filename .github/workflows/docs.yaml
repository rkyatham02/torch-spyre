name: docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - .readthedocs.yaml
  pull_request:
    branches: [main]
    paths:
      - docs/**
      - .readthedocs.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Build HTML
        run: python -m sphinx docs/source docs/build/html -W --keep-going
        # -W turns warnings into errors; --keep-going reports all warnings before failing
