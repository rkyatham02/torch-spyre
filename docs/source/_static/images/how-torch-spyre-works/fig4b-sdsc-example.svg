<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">SuperDSC Artifact: torch.abs on (4, 64) fp16 tensor — 2-core work division</text>

  <!-- ======================== -->
  <!-- LEFT: Host Tensor        -->
  <!-- ======================== -->
  <text x="160" y="68" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#475569">Host Tensor (4, 64) fp16</text>

  <!-- Row 0 -->
  <rect x="30" y="82" width="260" height="38" rx="3" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="160" y="105" text-anchor="middle" font-size="13" fill="#1e40af">Row 0 — 64 elements = 1 stick (128 B)</text>

  <!-- Row 1 -->
  <rect x="30" y="122" width="260" height="38" rx="3" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="160" y="145" text-anchor="middle" font-size="13" fill="#1e40af">Row 1 — 64 elements = 1 stick (128 B)</text>

  <!-- Row 2 -->
  <rect x="30" y="168" width="260" height="38" rx="3" fill="#ffedd5" stroke="#fdba74" stroke-width="1.5"/>
  <text x="160" y="191" text-anchor="middle" font-size="13" fill="#9a3412">Row 2 — 64 elements = 1 stick (128 B)</text>

  <!-- Row 3 -->
  <rect x="30" y="208" width="260" height="38" rx="3" fill="#ffedd5" stroke="#fdba74" stroke-width="1.5"/>
  <text x="160" y="231" text-anchor="middle" font-size="13" fill="#9a3412">Row 3 — 64 elements = 1 stick (128 B)</text>

  <!-- Bracket: Core 0 -->
  <line x1="298" y1="84" x2="308" y2="84" stroke="#2563eb" stroke-width="2"/>
  <line x1="308" y1="84" x2="308" y2="158" stroke="#2563eb" stroke-width="2"/>
  <line x1="298" y1="158" x2="308" y2="158" stroke="#2563eb" stroke-width="2"/>
  <text x="316" y="126" font-size="13.5" font-weight="bold" fill="#2563eb">Core 0</text>
  <text x="316" y="141" font-size="11.5" fill="#2563eb">addr: 0x000</text>

  <!-- Bracket: Core 1 -->
  <line x1="298" y1="170" x2="308" y2="170" stroke="#ea580c" stroke-width="2"/>
  <line x1="308" y1="170" x2="308" y2="244" stroke="#ea580c" stroke-width="2"/>
  <line x1="298" y1="244" x2="308" y2="244" stroke="#ea580c" stroke-width="2"/>
  <text x="316" y="212" font-size="13.5" font-weight="bold" fill="#ea580c">Core 1</text>
  <text x="316" y="227" font-size="11.5" fill="#ea580c">addr: 0x100</text>

  <!-- Split line -->
  <line x1="28" y1="163" x2="292" y2="163" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="14" y="167" font-size="11" fill="#64748b" text-anchor="end">split</text>

  <!-- Dim labels -->
  <text x="18" y="170" font-size="11.5" fill="#64748b" transform="rotate(-90, 18, 170)">c0 (rows) — split 2 ways</text>
  <text x="160" y="258" text-anchor="middle" font-size="11.5" fill="#64748b">c1 (columns) — 64 elements = 1 stick — unsplit</text>

  <!-- ======================== -->
  <!-- RIGHT: SuperDSC Fields   -->
  <!-- ======================== -->
  <text x="690" y="68" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#475569">SuperDSC JSON Fields</text>

  <!-- coreFoldProp_ -->
  <rect x="500" y="80" width="380" height="36" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="510" y="98" font-size="13" font-weight="bold" fill="#334155">coreFoldProp_</text>
  <text x="510" y="112" font-size="11.5" fill="#64748b">factor: 2, label: "core" — 2-way core split</text>

  <!-- coreIdToWkSlice_ -->
  <rect x="500" y="122" width="380" height="36" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="510" y="140" font-size="13" font-weight="bold" fill="#334155">coreIdToWkSlice_</text>
  <text x="510" y="154" font-size="11.5" fill="#64748b">core 0 → {c0: 0}, core 1 → {c0: 1}</text>

  <!-- dataStageParam_ -->
  <rect x="500" y="164" width="380" height="36" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="510" y="182" font-size="13" font-weight="bold" fill="#334155">dataStageParam_</text>
  <text x="510" y="196" font-size="11.5" fill="#64748b">ss: {c0: 2, c1: 64} — each core gets (2, 64) slice</text>

  <!-- labeledDs_ -->
  <rect x="500" y="206" width="380" height="36" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="510" y="224" font-size="13" font-weight="bold" fill="#334155">labeledDs_</text>
  <text x="510" y="238" font-size="11.5" fill="#64748b">Tensor0 (input), Tensor1 (output) — fp16, HBM+LX</text>

  <!-- scheduleTree_ -->
  <rect x="500" y="248" width="380" height="54" rx="5" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="510" y="266" font-size="13" font-weight="bold" fill="#334155">scheduleTree_  [allocate nodes]</text>
  <text x="510" y="280" font-size="11.5" fill="#64748b">startAddress: core 0 → 0, core 1 → 256</text>
  <text x="510" y="294" font-size="11.5" fill="#64748b">coordinates: c0 fold×2 cores, c1 stick dim (64 elem)</text>

  <!-- computeOp_ -->
  <rect x="500" y="308" width="380" height="36" rx="5" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="510" y="326" font-size="13" font-weight="bold" fill="#334155">computeOp_</text>
  <text x="510" y="340" font-size="11.5" fill="#64748b">exUnit: PT, opFunc: abs, in: Tensor0, out: Tensor1</text>

  <!-- ======================== -->
  <!-- Connecting arrows        -->
  <!-- ======================== -->

  <!-- Core 0 bracket → coreIdToWkSlice_ -->
  <path d="M 375 126 L 420 126 Q 440 126 440 136 L 440 138 Q 440 140 460 140 L 496 140"
        fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Core 1 bracket → coreIdToWkSlice_ -->
  <path d="M 375 212 L 420 212 Q 440 212 440 180 L 440 155 Q 440 148 460 148 L 496 148"
        fill="none" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- ======================== -->
  <!-- BOTTOM: Address Layout   -->
  <!-- ======================== -->
  <text x="480" y="390" text-anchor="middle" font-size="14.5" font-weight="bold" fill="#475569">Device Memory Layout (HBM)</text>

  <!-- Memory bar -->
  <rect x="80" y="405" width="800" height="50" rx="4" fill="white" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Core 0 region -->
  <rect x="80" y="405" width="400" height="50" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="280" y="427" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Core 0 slice</text>
  <text x="280" y="443" text-anchor="middle" font-size="11.5" fill="#1e40af">Row 0 (stick) | Row 1 (stick) = 256 bytes</text>

  <!-- Core 1 region -->
  <rect x="480" y="405" width="400" height="50" rx="4" fill="#ffedd5" stroke="#fdba74" stroke-width="1.5"/>
  <text x="680" y="427" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412">Core 1 slice</text>
  <text x="680" y="443" text-anchor="middle" font-size="11.5" fill="#9a3412">Row 2 (stick) | Row 3 (stick) = 256 bytes</text>

  <!-- Address labels -->
  <text x="80" y="475" text-anchor="middle" font-size="11.5" fill="#64748b">byte 0</text>
  <text x="280" y="475" text-anchor="middle" font-size="11.5" fill="#64748b">byte 128</text>
  <text x="480" y="475" text-anchor="middle" font-size="11.5" fill="#64748b">byte 256</text>
  <text x="680" y="475" text-anchor="middle" font-size="11.5" fill="#64748b">byte 384</text>
  <text x="880" y="475" text-anchor="middle" font-size="11.5" fill="#64748b">byte 512</text>

  <!-- Tick marks -->
  <line x1="80" y1="455" x2="80" y2="462" stroke="#94a3b8" stroke-width="1"/>
  <line x1="280" y1="455" x2="280" y2="462" stroke="#94a3b8" stroke-width="1"/>
  <line x1="480" y1="455" x2="480" y2="462" stroke="#94a3b8" stroke-width="1"/>
  <line x1="680" y1="455" x2="680" y2="462" stroke="#94a3b8" stroke-width="1"/>
  <line x1="880" y1="455" x2="880" y2="462" stroke="#94a3b8" stroke-width="1"/>

  <!-- Address annotation -->
  <text x="480" y="500" text-anchor="middle" font-size="11.5" font-style="italic" fill="#374151">startAddressCoreCorelet_: core 0 → "0", core 1 → "256"  (each stick = 128 bytes)</text>

</svg>
