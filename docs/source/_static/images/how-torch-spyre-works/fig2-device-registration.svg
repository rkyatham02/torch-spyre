<svg viewBox="0 0 800 360" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#bbbbbb"/>
    </marker>
    <marker id="arr-blue" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- ── User code box at top ── -->
  <rect x="240" y="8" width="320" height="36" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="400" y="24" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">User Code</text>
  <text x="400" y="37" text-anchor="middle" font-size="10.5" fill="#3b82f6" font-family="monospace">model.to("spyre")  ·  torch.compile(model)</text>

  <!-- Arrow from user code down -->
  <line x1="400" y1="44" x2="400" y2="58" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Row backgrounds (shifted down by ~50px to make room for user code) -->
  <rect x="30" y="60"  width="760" height="72" rx="5" fill="#F3F4F6" stroke="#E0E0E0" stroke-width="1"/>
  <rect x="30" y="142" width="760" height="98" rx="5" fill="#FFF7F4" stroke="#F5C8A8" stroke-width="1.2"/>
  <rect x="30" y="252" width="760" height="60" rx="5" fill="#F3F4F6" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Row labels -->
  <text transform="translate(14,96)  rotate(-90)" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937" letter-spacing="0.9">PYTORCH CORE</text>
  <text transform="translate(14,191) rotate(-90)" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937" letter-spacing="0.9">TORCH_SPYRE</text>
  <text transform="translate(14,282) rotate(-90)" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2937" letter-spacing="0.9">HARDWARE</text>

  <!-- ROW 1 — PyTorch extension points -->
  <rect x="52"  y="70" width="136" height="52" rx="3" fill="#374151"/>
  <text x="120" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">DeviceGuard</text>
  <text x="120" y="105" text-anchor="middle" font-size="10.5" fill="#e8edf2">C10_REGISTER_GUARD_IMPL</text>

  <rect x="197" y="70" width="136" height="52" rx="3" fill="#374151"/>
  <text x="265" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Device Allocator</text>
  <text x="265" y="105" text-anchor="middle" font-size="10.5" fill="#e8edf2">REGISTER_ALLOCATOR</text>

  <rect x="342" y="70" width="136" height="52" rx="3" fill="#374151"/>
  <text x="410" y="89" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">TorchInductor</text>
  <text x="410" y="102" text-anchor="middle" font-size="10" fill="#e8edf2">Backend API +</text>
  <text x="410" y="114" text-anchor="middle" font-size="10" fill="#e8edf2">FixedLayout subclass</text>

  <rect x="487" y="70" width="136" height="52" rx="3" fill="#374151"/>
  <text x="555" y="89" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">PrivateUse1</text>
  <text x="555" y="102" text-anchor="middle" font-size="10" fill="#e8edf2">Hooks Interface +</text>
  <text x="555" y="114" text-anchor="middle" font-size="10" fill="#e8edf2">_register_device_module</text>

  <rect x="632" y="70" width="136" height="52" rx="3" fill="#374151"/>
  <text x="700" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">Stream API</text>
  <text x="700" y="105" text-anchor="middle" font-size="10.5" fill="#e8edf2">torch.cuda.Stream semantics</text>

  <!-- Arrows row1 → row2 -->
  <line x1="120" y1="122" x2="120" y2="142" stroke="#CCCCCC" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="265" y1="122" x2="265" y2="142" stroke="#CCCCCC" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="410" y1="122" x2="410" y2="142" stroke="#CCCCCC" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="555" y1="122" x2="555" y2="142" stroke="#CCCCCC" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="700" y1="122" x2="700" y2="142" stroke="#CCCCCC" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ROW 2 — torch_spyre -->
  <rect x="52"  y="152" width="136" height="76" rx="3" fill="#E55B15"/>
  <text x="120" y="172" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">SpyreGuardImpl</text>
  <text x="120" y="186" text-anchor="middle" font-size="11" fill="#ffffff">Device context</text>
  <text x="120" y="198" text-anchor="middle" font-size="11" fill="#ffffff">Thread-local tracking</text>
  <text x="120" y="212" text-anchor="middle" font-size="10.5" fill="#ffe8d8">10+ dtypes supported</text>

  <rect x="197" y="152" width="136" height="76" rx="3" fill="#E55B15"/>
  <text x="265" y="172" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">SpyreAllocator</text>
  <text x="265" y="186" text-anchor="middle" font-size="11" fill="#ffffff">Flex memory system</text>
  <text x="265" y="198" text-anchor="middle" font-size="11" fill="#ffffff">SharedOwnerCtx</text>
  <text x="265" y="212" text-anchor="middle" font-size="10.5" fill="#ffe8d8">No raw pointers</text>

  <rect x="342" y="152" width="136" height="76" rx="3" fill="#E55B15"/>
  <text x="410" y="172" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">SpyreTensorImpl</text>
  <text x="410" y="186" text-anchor="middle" font-size="11" fill="#ffffff">Tiled layout metadata</text>
  <text x="410" y="198" text-anchor="middle" font-size="11" fill="#ffffff">SpyreTensorLayout</text>
  <text x="410" y="212" text-anchor="middle" font-size="10.5" fill="#ffe8d8">BYTES_IN_STICK=128</text>

  <rect x="487" y="152" width="136" height="76" rx="3" fill="#E55B15"/>
  <text x="555" y="172" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">SpyreHooksIface</text>
  <text x="555" y="186" text-anchor="middle" font-size="11" fill="#ffffff">Device availability</text>
  <text x="555" y="198" text-anchor="middle" font-size="11" fill="#ffffff">Primary context</text>
  <text x="555" y="212" text-anchor="middle" font-size="10.5" fill="#ffe8d8">Lazy init reporting</text>

  <rect x="632" y="152" width="136" height="76" rx="3" fill="#E55B15"/>
  <text x="700" y="172" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">SpyreStream</text>
  <text x="700" y="186" text-anchor="middle" font-size="11" fill="#ffffff">Async execution</text>
  <text x="700" y="198" text-anchor="middle" font-size="11" fill="#ffffff">Stream(), sync()</text>
  <text x="700" y="212" text-anchor="middle" font-size="10.5" fill="#ffe8d8">CPU↔Spyre overlap</text>

  <!-- Arrows row2 → row3 -->
  <line x1="265" y1="228" x2="232" y2="252" stroke="#CCCCCC" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="700" y1="228" x2="614" y2="252" stroke="#CCCCCC" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ROW 3 — Hardware -->
  <rect x="52"  y="260" width="358" height="40" rx="3" fill="#374151"/>
  <text x="231" y="276" text-anchor="middle" font-size="11.5" font-weight="700" fill="#FFFFFF">flex Runtime</text>
  <text x="231" y="291" text-anchor="middle" font-size="10.5" fill="#e8edf2">initializeRuntime() · runJobPlan()</text>

  <rect x="420" y="260" width="370" height="40" rx="3" fill="#374151"/>
  <text x="605" y="276" text-anchor="middle" font-size="11.5" font-weight="700" fill="#FFFFFF">Spyre Accelerator</text>
  <text x="605" y="291" text-anchor="middle" font-size="10.5" fill="#e8edf2">32 cores · &gt;300 TOPS · 75W PCIe slot</text>

  <!-- Execution path: highlighted blue arrow tracing model.to("spyre") flow -->
  <!-- From user code → PrivateUse1 box (top) → SpyreGuardImpl (middle) → hardware -->
  <line x1="555" y1="58" x2="555" y2="70" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arr-blue)"/>
  <text x="576" y="54" font-size="10" fill="#3b82f6" font-style="italic">execution path</text>

  <!-- execution path label -->
  <rect x="30" y="330" width="740" height="22" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="400" y="344" text-anchor="middle" font-size="11.5" fill="#1d4ed8">Execution path: model.to("spyre") → PrivateUse1 → SpyreGuardImpl / SpyreHooksIface → flex Runtime → Spyre hardware</text>
</svg>
