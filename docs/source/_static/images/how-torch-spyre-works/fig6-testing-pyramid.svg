  <line x1="532" y1="190" x2="556" y2="190" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="560" y="186" font-size="10.5" fill="#1f2937">Op vs. CPU reference output</text>
  <text x="560" y="198" font-size="10.5" fill="#374151">fp16 tolerance profiles</text>

  <line x1="602" y1="249" x2="626" y2="249" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="630" y="243" font-size="10.5" fill="#1f2937">PyTorch device compatibility</text>
  <text x="630" y="255" font-size="10.5" fill="#374151">Maintained allowlist per op</text>
  <text x="630" y="267" font-size="10.5" fill="#1f2937">Runs in CI on every PR — no Spyre HW needed</text>

  <!-- Left annotation -->
  <!-- left annotations moved above CI bar -->
  <text x="6" y="283" font-size="10.5" fill="#374151">Largest suite</text>
  <text x="6" y="293" font-size="10.5" fill="#1f2937">No HW needed</text>

  <!-- All levels run in CI banner -->
  <rect x="10" y="307" width="590" height="10" rx="2" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="305" y="315" text-anchor="middle" font-size="11.5" font-weight="600" fill="#166534">All 4 levels run in CI on every PR</text>
