<svg viewBox="0 0 860 325" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Layer 4 base: PyTorch Upstream Tests -->
  <polygon points="10,278 600,278 530,220 80,220" fill="#E8EEF8" stroke="#8898C8" stroke-width="1.3"/>
