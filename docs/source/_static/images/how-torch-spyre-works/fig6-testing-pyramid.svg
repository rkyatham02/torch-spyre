  <text x="305" y="203" text-anchor="middle" font-size="10.5" fill="#2d5a2d">test_inductor_ops.py · Each op vs. CPU reference · fp16 tolerances</text>

  <!-- Layer 2: Building Blocks -->
  <polygon points="150,160 460,160 390,108 220,108" fill="#fef0e6" stroke="#e0915a" stroke-width="1.3"/>
  <text x="305" y="131" text-anchor="middle" font-size="12" font-weight="700" fill="#7a3a00">Building Blocks</text>
  <text x="305" y="147" text-anchor="middle" font-size="10.5" fill="#7a3a00">test_building_blocks.py · FFN · Attention · Norm layers</text>

  <!-- Layer 1: End-to-End (top) -->
  <polygon points="220,105 390,105 305,20" fill="#374151" stroke="#4b5563" stroke-width="1.3"/>
  <text x="305" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">End-to-End</text>
  <text x="305" y="84" text-anchor="middle" font-size="10.5" fill="#f1f5f9">test_model_ops.py</text>

  <!-- Right annotations -->
  <line x1="393" y1="74" x2="424" y2="74" stroke="#374151" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="428" y="70"  font-size="10.5" fill="#1f2937">Full model forward pass</text>
  <text x="428" y="82"  font-size="10.5" fill="#374151">Real weights · YAML tolerance configs</text>
