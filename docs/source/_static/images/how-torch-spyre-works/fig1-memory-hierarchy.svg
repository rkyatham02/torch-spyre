<svg viewBox="0 0 860 230" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#555"/>
    </marker>
    <marker id="arr-rev" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto">
      <polygon points="8 0,0 3,8 6" fill="#555"/>
    </marker>
  </defs>

  <text x="648" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#1f2937" letter-spacing="2">SPYRE CORE</text>

  <!-- Host CPU -->
  <rect x="10" y="28" width="160" height="162" rx="5" fill="#ffffff" stroke="#374151" stroke-width="1.5"/>
  <rect x="10" y="28" width="160" height="30" rx="5" fill="#374151"/>
  <rect x="10" y="46" width="160" height="12" fill="#374151"/>
  <text x="90" y="49" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Host CPU</text>
  <text x="90" y="76" text-anchor="middle" font-size="11.5" fill="#1f2937">System Memory</text>
  <text x="90" y="92" text-anchor="middle" font-size="11.5" fill="#1f2937">PyTorch tensors</text>
  <text x="90" y="107" text-anchor="middle" font-size="11" fill="#374151">(size, stride)</text>
  <text x="90" y="122" text-anchor="middle" font-size="11" fill="#1f2937">standard layout</text>
  <text x="90" y="150" text-anchor="middle" font-size="10.5" fill="#374151">CPU DRAM</text>

  <!-- PCIe -->
  <line x1="172" y1="110" x2="215" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="194" y="102" text-anchor="middle" font-size="11" fill="#374151">PCIe</text>

  <!-- Device Memory -->
  <rect x="218" y="28" width="162" height="162" rx="5" fill="#ffffff" stroke="#374151" stroke-width="1.5"/>
  <rect x="218" y="28" width="162" height="30" rx="5" fill="#374151"/>
  <rect x="218" y="46" width="162" height="12" fill="#374151"/>
  <text x="299" y="49" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Device Memory</text>
  <text x="299" y="76" text-anchor="middle" font-size="11.5" fill="#1f2937">Primary tensor storage</text>
  <text x="299" y="92" text-anchor="middle" font-size="11.5" fill="#e55b15" font-weight="600">Tiled stick format</text>
  <text x="299" y="107" text-anchor="middle" font-size="11" fill="#374151">128 GB LPDDR5</text>
  <text x="299" y="122" text-anchor="middle" font-size="11" fill="#1f2937">highest latency</text>
  <text x="299" y="150" text-anchor="middle" font-size="10.5" fill="#374151">staging area for SRAM</text>

  <!-- Spyre Core dashed border -->
  <rect x="418" y="22" width="432" height="168" rx="6" fill="#fafafa" stroke="#dddddd" stroke-width="1.5" stroke-dasharray="6,3"/>

  <!-- No-cache badge -->
  <rect x="432" y="26" width="122" height="16" rx="3" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="493" y="37" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">✕  No hardware cache</text>

  <!-- DMA arrow + labels — IMPROVED: prominent highlight box -->
  <line x1="382" y1="110" x2="416" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arr)" marker-start="url(#arr-rev)"/>
  <rect x="374" y="90" width="51" height="40" rx="3" fill="#fff0ea" stroke="#e55b15" stroke-width="1.5"/>
  <text x="399" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#e55b15">DMA</text>
  <text x="399" y="116" text-anchor="middle" font-size="10" font-weight="700" fill="#c14a0f">compiler-</text>
  <text x="399" y="126" text-anchor="middle" font-size="10" font-weight="700" fill="#c14a0f">planned</text>

  <!-- L2 Scratchpad -->
  <rect x="430" y="48" width="184" height="130" rx="5" fill="#ffffff" stroke="#e55b15" stroke-width="1.5"/>
  <rect x="430" y="48" width="184" height="30" rx="5" fill="#e55b15"/>
  <rect x="430" y="66" width="184" height="12" fill="#e55b15"/>
  <text x="522" y="69" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">L2 Scratchpad (LX)</text>
  <text x="522" y="96" text-anchor="middle" font-size="11.5" fill="#1f2937">2 MB SRAM per core</text>
  <text x="522" y="111" text-anchor="middle" font-size="11.5" fill="#e55b15" font-weight="600">Compiler-Managed SRAM</text>
  <text x="522" y="126" text-anchor="middle" font-size="11" fill="#374151">Explicit allocation only</text>
  <text x="522" y="141" text-anchor="middle" font-size="10.5" fill="#374151">populated by compiler schedule</text>
  <text x="522" y="155" text-anchor="middle" font-size="10.5" fill="#374151">medium latency</text>

  <!-- internal arrow -->
  <line x1="616" y1="110" x2="650" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Compute Units -->
  <rect x="652" y="48" width="182" height="130" rx="5" fill="#ffffff" stroke="#374151" stroke-width="1.5"/>
  <rect x="652" y="48" width="182" height="30" rx="5" fill="#374151"/>
  <rect x="652" y="66" width="182" height="12" fill="#374151"/>
  <text x="743" y="69" text-anchor="middle" font-size="12.5" font-weight="700" fill="#ffffff">Compute Units</text>
  <text x="743" y="96" text-anchor="middle" font-size="11.5" fill="#1f2937">8×8 Systolic Array</text>
  <text x="743" y="111" text-anchor="middle" font-size="11.5" fill="#1f2937">+ 1D Vector Unit</text>
  <text x="743" y="126" text-anchor="middle" font-size="11" fill="#374151">dual corelets / core</text>
  <text x="743" y="141" text-anchor="middle" font-size="11" fill="#1f2937">lowest latency</text>
  <text x="743" y="155" text-anchor="middle" font-size="10.5" fill="#374151">32 cores total</text>

  <!-- Bottom annotation -->
  <text x="430" y="208" text-anchor="middle" font-size="11.5" fill="#1f2937" font-style="italic">Memory hierarchy: 128 GB LPDDR5 → 2 MB SRAM/core. All movement is explicit, compiler-scheduled DMA — no implicit eviction or prefetch.</text>
</svg>
